<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Змейка — с рекордами</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="game-container">
    <div class="score-board">🍎 Счёт: <span id="scoreDisplay">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button class="btn btn-restart" id="restartBtn">⟳ Новая игра</button>
        <button class="btn" id="scoresBtn">🏆 Рекорды</button>
    </div>
    <div class="hint">
        Управление: <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
